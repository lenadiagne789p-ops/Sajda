name: sajda
description: "Application Sajda"
publish_to: "none"
version: 1.0.1+2

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_fonts: ^6.1.0
  shared_preferences: ^2.2.2
  smooth_page_indicator: ^1.1.0
  audioplayers: ^6.5.1
  flutter_local_notifications: ^17.2.4
  geolocator: ^13.0.4
  permission_handler: ^11.0.0
  geocoding: ^3.0.0
  vibration: ^1.9.0
  http: ^1.1.0
  provider: ^6.1.2
  url_launcher: ^6.3.0
  in_app_purchase: ^3.2.0
  video_player: ^2.9.2
  youtube_player_iframe: ^5.2.2
  flutter_tts: ^4.2.2
  hijri: ^3.0.0
  firebase_auth: ^5.5.0
  flutter_qiblah: ^3.1.0+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/salat/
    - assets/audio/
    - assets/videos/
    - assets/data/
